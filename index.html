<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер для скорочитання</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="language-switcher">
        <button id="langBtn" class="lang-btn" title="Zmінити мову / Change language">🌐 УК/EN</button>
    </div>
    <div class="container">
        <h1>📚 <span data-i18n="title">Тренажер для скорочитання</span></h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="textInput" data-i18n="uploadLabel">Завантажте файл (.txt, .pdf, .doc, .docx, .epub, .djvu):</label>
                <input type="file" id="textInput" accept=".txt,.pdf,.doc,.docx,.epub,.djvu">
            </div>

            <div class="control-group">
                <label for="textPaste" data-i18n="pasteLabel">Або вставте текст сюди:</label>
                <textarea id="textPaste" rows="6" placeholder="" data-i18n-placeholder="pastePlaceholder"></textarea>
                <div class="paste-row">
                    <button id="pasteBtn" type="button" data-i18n="pasteBtn">Вставити з буфера</button>
                    <button id="loadPasteBtn" type="button" data-i18n="loadPasteBtn">Завантажити текст</button>
                </div>
            </div>
            
            <div class="control-group">
                <label for="wordsPerLine" data-i18n="wordsPerLine">Слів у рядку:</label>
                <input type="number" id="wordsPerLine" min="1" max="20" value="5">
            </div>
            
            <div class="control-group">
                <label for="speed" data-i18n="speedLabel">Пауза між рядками (мс):</label>
                <input type="number" id="speed" min="0" max="5000" step="100" value="200">
                <small data-i18n="speedHint">Чим менше — тим швидше зʼявляється наступний рядок</small>
            </div>

            <div class="control-group">
                <label for="holdTime" data-i18n="holdTimeLabel">Час на максимальному розмірі (мс):</label>
                <input type="number" id="holdTime" min="0" max="3000" step="100" value="600">
                <small data-i18n="holdTimeHint">Рядок затримується перед тим, як зникнути</small>
            </div>

            <div class="control-group">
                <label for="maxFontSize" data-i18n="fontSizeLabel">Максимальний розмір шрифту (px):</label>
                <input type="number" id="maxFontSize" min="20" max="120" step="2" value="48">
                <small data-i18n="fontSizeHint">Встановіть максимальний розмір тексту на паузі</small>
            </div>

            <div class="control-group">
                <label for="statusOffset" data-i18n="offsetLabel">Позиція WPM (px):</label>
                <input type="range" id="statusOffset" min="0" max="480" step="5" value="40">
                <small id="statusOffsetValue">Відступ зверху 40px</small>
            </div>
            
            <div class="buttons">
                <button id="startBtn" disabled data-i18n="startBtn">Почати</button>
                <button id="pauseBtn" disabled data-i18n="pauseBtn">Пауза</button>
                <button id="stopBtn" disabled data-i18n="stopBtn">Зупинити</button>
            </div>
            <div class="buttons">
                <button id="loadLastBtn" type="button" data-i18n="loadLastBtn">Завантажити останню книгу</button>
            </div>
        </div>
        
        <div class="display-area">
            <div class="display-inner">
                <div id="textDisplay" class="text-display"></div>
            </div>
            <div class="status">
                <p id="statusText" data-i18n="defaultStatus">Завантажте текст для початку</p>
                <p id="wpmText">WPM: 0</p>
                <div class="pwa-status">
                    <p id="connectionStatus">Онлайн</p>
                    <button id="installBtn" type="button" class="install-btn" hidden data-i18n="installBtn">Встановити додаток</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="lib/pdf.min.js"></script>
    <script>
        // Set up PDF.js worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.min.js';
        }
    </script>
    <script src="lib/mammoth.browser.min.js"></script>
    <script src="lib/jszip.min.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.warn('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
